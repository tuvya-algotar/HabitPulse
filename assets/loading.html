<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading HabitPulse</title>
    <style>
        body {
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-app-region: drag; /* allows dragging the splash screen */
            border-radius: 12px;      /* Needs transparent: true in BrowserWindow to see corners */
            border: 1px solid #222;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6; /* A nice blue color for the spinner */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        p {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #888;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>HabitPulse</h2>
    <p>Starting up...</p>
</body>
</html>
